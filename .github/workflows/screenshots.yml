name: Update screenshots

on:
  workflow_dispatch:

env:
  JAVA_VERSION: 21
  JAVA_DISTRIBUTION: 'zulu'

jobs:



  RecordScreenshotMatrixSetup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - run: ./gradlew ciRecordScreenshotJobsMatrixSetup --stacktrace

      - id: matrix
        run: echo "matrix=$(cat build/record_screenshot_jobs_matrix.json | jq -c .)" >> $GITHUB_OUTPUT



  RecordScreenshot:
    needs: RecordScreenshotMatrixSetup
    runs-on: ${{ matrix.variants.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        variants: ${{ fromJson(needs.RecordScreenshotMatrixSetup.outputs.matrix) }}
    steps:

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - id: screenshots_path
        run: |
          MODULE_PATH=$(echo "${{ matrix.variants.module_path }}" | sed 's/^://' | tr ':' '/')
          echo "path=${MODULE_PATH}/src/screenshots" >> $GITHUB_OUTPUT

      - name: Remove platform screenshots
        run: |
          if [[ "${{ matrix.variants.runner }}" == "macOS-26" ]]; then
            find "${{ steps.screenshots_path.outputs.path }}" -name "*IosTest*" -delete 2>/dev/null || true
          else
            find "${{ steps.screenshots_path.outputs.path }}" -name "*JvmTest*" -delete 2>/dev/null || true
            find "${{ steps.screenshots_path.outputs.path }}" -name "*AndroidTest*" -delete 2>/dev/null || true
          fi

      - run: ./gradlew ${{ matrix.variants.gradle_tasks }} -DIS_DATA_STUB_ENABLED=true --stacktrace

      - name: Install pngcheck
        run: |
          if [[ "${{ matrix.variants.runner }}" == "macOS-26" ]]; then
            brew install pngcheck
          else
            sudo apt-get install -y pngcheck
          fi

      - name: Check PNG files
        run: |
          if [[ "${{ matrix.variants.runner }}" == "macOS-26" ]]; then
            find "${{ steps.screenshots_path.outputs.path }}" -name "*IosTest*.png" | xargs pngcheck -q
          else
            find "${{ steps.screenshots_path.outputs.path }}" \( -name "*JvmTest*.png" -o -name "*AndroidTest*.png" \) | xargs pngcheck -q
          fi

      - run: git pull --rebase --autostash

      - uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: Update screenshots
